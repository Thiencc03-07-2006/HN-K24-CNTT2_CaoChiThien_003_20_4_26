<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
    </head>
    <body>
        <h2 style="text-align: center">Courses</h2>
        <div style="display: flex; justify-content: space-around;">
            <form th:action="@{'/courses'}" method="get">
                <div>
                    <input type="text" name="keyword"
                           placeholder="Nhập từ khóa để tìm theo tên khóa học hoặc giảng viên">
                </div>
            </form>
            <div>
                <a th:href="@{/courses/add}">
                    <button>Add</button>
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(list)}">
            <p>Không có khóa học nào</p>
        </div>
        <div th:if="${!#lists.isEmpty(list)}">
            <table style="border: 1px solid black; margin-left: auto; margin-right: auto; width: 100%;border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="border: 1px solid black">STT</th>
                        <th style="border: 1px solid black">CouresName</th>
                        <th style="border: 1px solid black">Instructor</th>
                        <th style="border: 1px solid black">Duration</th>
                        <!--                        <th style="border: 1px solid black">Thumbnail</th>-->
                        <th style="border: 1px solid black" colspan="2">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c,i: ${list}">
                        <td style="border: 1px solid black" th:text="${i.index}"></td>
                        <td style="border: 1px solid black" th:text="${c.getCourseName()}"></td>
                        <td style="border: 1px solid black" th:text="${c.getInstructor()}"></td>
                        <td style="border: 1px solid black" th:text="${c.getDuration()}"></td>
                        <!--                        <td th:text="${c.getThumbnail()}"></td>-->
                        <td style="border: 1px solid black"><a th:href="@{'courses/edit/'+${c.id}}">Sửa</a></td>
                        <td style="border: 1px solid black"><a th:href="@{'courses/delete/'+${c.id}}"
                                                               onclick="return confirm('Xóa khóa học')">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
